# Velero Schedule — daily backup of the o3 namespace (TRUNK-6485)
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: o3-daily-backup
  namespace: velero
spec:
  schedule: "0 2 * * *"
  useOwnerReferencesInBackup: false
  template:
    ttl: "720h0m0s"
    includedNamespaces:
      - o3
    storageLocation: default
    volumeSnapshotLocations:
      - default